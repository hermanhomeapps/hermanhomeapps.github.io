<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shabbos Chores & Points</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #241F38;
    --bg-soft: #2E2850;
    --gold: #D9A548;
    --gold-soft: #F0D9A0;
    --cream: #F5EFE0;
    --rose: #C97064;
    --error: #E37B6B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, var(--bg-soft), var(--bg) 60%);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }
  .flames {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 8px;
  }
  .flame {
    width: 10px;
    height: 22px;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold) 60%, var(--rose));
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    filter: blur(0.3px);
    animation: flicker 2.6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .flame:nth-child(2) { animation-delay: 0.4s; }
  @keyframes flicker {
    0%, 100% { transform: scaleY(1) rotate(-1deg); opacity: 1; }
    50% { transform: scaleY(1.08) rotate(1deg); opacity: 0.9; }
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 2rem;
    margin: 0 0 4px;
    letter-spacing: 0.01em;
  }
  .subtitle {
    color: var(--gold-soft);
    font-size: 0.95rem;
    margin: 0 0 36px;
    opacity: 0.85;
  }
  .kid-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .kid-btn {
    background: var(--bg-soft);
    border: 1px solid rgba(217, 165, 72, 0.25);
    color: var(--cream);
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
    padding: 22px 12px;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .kid-btn:hover, .kid-btn:focus-visible {
    border-color: var(--gold);
    transform: translateY(-2px);
    outline: none;
  }
  .mommy-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(245, 239, 224, 0.2);
    color: var(--gold-soft);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .mommy-btn:hover, .mommy-btn:focus-visible { border-color: var(--gold); outline: none; }
  .status-line {
    margin-top: 28px;
    font-size: 0.8rem;
    color: rgba(245, 239, 224, 0.5);
    min-height: 1.2em;
  }
  /* PIN modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20, 16, 34, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg-soft);
    border: 1px solid rgba(217, 165, 72, 0.3);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    margin: 0 0 16px;
  }
  .modal input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(245, 239, 224, 0.25);
    background: var(--bg);
    color: var(--cream);
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: 0.3em;
    margin-bottom: 12px;
  }
  .modal input:focus { outline: none; border-color: var(--gold); }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal-actions button {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-confirm { background: var(--gold); color: var(--bg); }
  .btn-cancel { background: transparent; color: var(--cream); border: 1px solid rgba(245,239,224,0.2) !important; }
  .pin-error { color: var(--error); font-size: 0.85rem; min-height: 1.2em; margin-bottom: 8px; }

  /* Placeholder dashboard (removed once real dashboard piece is built) */
  .dashboard { display: none; text-align: left; }
  .dashboard.open { display: block; }
  .welcome-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .logout-link { color: var(--gold-soft); font-size: 0.85rem; cursor: pointer; background: none; border: none; }
</style>
</head>
<body>

<div class="card">

  <!-- LOGIN VIEW -->
  <div id="loginView">
    <div class="flames"><div class="flame"></div><div class="flame"></div></div>
    <h1>Shabbos Chores</h1>
    <p class="subtitle">Who's checking in?</p>
    <div id="kidGrid" class="kid-grid"><!-- kid buttons injected here --></div>
    <button class="mommy-btn" id="mommyBtn">I'm Mommy</button>
    <div class="status-line" id="statusLine">Loading...</div>
  </div>

  <!-- DASHBOARD PLACEHOLDER (next piece replaces this) -->
  <div id="dashboardView" class="dashboard">
    <div class="welcome-bar">
      <h1 id="welcomeText" style="font-size:1.4rem;"></h1>
      <button class="logout-link" id="logoutBtn">Log out</button>
    </div>
    <p style="opacity:0.7;">Dashboard coming in the next piece — login is working if you can see this.</p>
  </div>

</div>

<!-- PIN MODAL -->
<div class="overlay" id="pinOverlay">
  <div class="modal">
    <h2>Enter Mommy's PIN</h2>
    <div class="pin-error" id="pinError"></div>
    <input type="password" inputmode="numeric" id="pinInput" maxlength="8" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="pinCancel">Cancel</button>
      <button class="btn-confirm" id="pinConfirm">Enter</button>
    </div>
  </div>
</div>

<script>
  // ===== CONFIG =====
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx2h9qFRVB4yBifHUy5-RHGkHd2nxDrOg5G98_rAS1MWKblV-qe1SLD14MaKuUMZoax/exec";

  let appData = { kids: [], config: {} };

  const kidGrid = document.getElementById('kidGrid');
  const statusLine = document.getElementById('statusLine');
  const mommyBtn = document.getElementById('mommyBtn');
  const pinOverlay = document.getElementById('pinOverlay');
  const pinInput = document.getElementById('pinInput');
  const pinError = document.getElementById('pinError');
  const pinConfirm = document.getElementById('pinConfirm');
  const pinCancel = document.getElementById('pinCancel');
  const loginView = document.getElementById('loginView');
  const dashboardView = document.getElementById('dashboardView');
  const welcomeText = document.getElementById('welcomeText');
  const logoutBtn = document.getElementById('logoutBtn');

  async function loadData() {
    try {
      const res = await fetch(BACKEND_URL);
      const data = await res.json();
      appData.kids = data.kids || [];
      appData.config = (data.config && data.config[0]) || {};
      renderKids();
      checkExistingSession();
    } catch (err) {
      statusLine.textContent = "Couldn't reach the chore list. Check your connection.";
      console.error(err);
    }
  }

  function renderKids() {
    kidGrid.innerHTML = '';
    if (appData.kids.length === 0) {
      statusLine.textContent = "No kids added yet — Mommy can add them from her dashboard.";
      return;
    }
    statusLine.textContent = '';
    appData.kids.forEach(kid => {
      const btn = document.createElement('button');
      btn.className = 'kid-btn';
      btn.textContent = kid.name;
      btn.onclick = () => logIn(kid.kid_id, kid.name, false);
      kidGrid.appendChild(btn);
    });
  }

  function logIn(id, name, isAdmin) {
    sessionStorage.setItem('shabbos_user', JSON.stringify({ id, name, isAdmin }));
    showDashboard(name, isAdmin);
  }

  function checkExistingSession() {
    const saved = sessionStorage.getItem('shabbos_user');
    if (saved) {
      const user = JSON.parse(saved);
      showDashboard(user.name, user.isAdmin);
    }
  }

  function showDashboard(name, isAdmin) {
    loginView.style.display = 'none';
    dashboardView.classList.add('open');
    welcomeText.textContent = isAdmin ? `Hi Mommy` : `Hi ${name}`;
  }

  logoutBtn.onclick = () => {
    sessionStorage.removeItem('shabbos_user');
    dashboardView.classList.remove('open');
    loginView.style.display = 'block';
  };

  mommyBtn.onclick = () => {
    pinInput.value = '';
    pinError.textContent = '';
    pinOverlay.classList.add('open');
    pinInput.focus();
  };
  pinCancel.onclick = () => pinOverlay.classList.remove('open');

  function tryPin() {
    const entered = pinInput.value.trim();
    const correct = String(appData.config.admin_pin || '');
    if (entered.length === 0) return;
    if (entered === correct) {
      pinOverlay.classList.remove('open');
      logIn('mommy', 'Mommy', true);
    } else {
      pinError.textContent = 'Incorrect PIN, try again.';
      pinInput.value = '';
      pinInput.focus();
    }
  }
  pinConfirm.onclick = tryPin;
  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPin(); });

  loadData();
</script>
</body>
</html>
