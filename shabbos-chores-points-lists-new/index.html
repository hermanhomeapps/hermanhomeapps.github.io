<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shabbos Chores & Points</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #241F38;
    --bg-soft: #2E2850;
    --bg-card: #352E5C;
    --gold: #D9A548;
    --gold-soft: #F0D9A0;
    --cream: #F5EFE0;
    --rose: #C97064;
    --error: #E37B6B;
    --green: #7FA37A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, var(--bg-soft), var(--bg) 60%);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    padding: 24px;
  }
  .page { max-width: 720px; margin: 0 auto; }

  /* ===== LOGIN VIEW ===== */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .card { width: 100%; max-width: 480px; text-align: center; }
  .flames { display: flex; justify-content: center; gap: 18px; margin-bottom: 8px; }
  .flame {
    width: 10px; height: 22px;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold) 60%, var(--rose));
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    filter: blur(0.3px);
    animation: flicker 2.6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .flame:nth-child(2) { animation-delay: 0.4s; }
  @keyframes flicker {
    0%, 100% { transform: scaleY(1) rotate(-1deg); opacity: 1; }
    50% { transform: scaleY(1.08) rotate(1deg); opacity: 0.9; }
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2rem; margin: 0 0 4px; }
  .subtitle { color: var(--gold-soft); font-size: 0.95rem; margin: 0 0 36px; opacity: 0.85; }
  .kid-grid-login { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .kid-btn {
    background: var(--bg-soft); border: 1px solid rgba(217, 165, 72, 0.25); color: var(--cream);
    font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 500; padding: 22px 12px;
    border-radius: 14px; cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .kid-btn:hover, .kid-btn:focus-visible { border-color: var(--gold); transform: translateY(-2px); outline: none; }
  .mommy-btn {
    width: 100%; background: transparent; border: 1px solid rgba(245, 239, 224, 0.2); color: var(--gold-soft);
    font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 14px; border-radius: 12px; cursor: pointer;
    margin-top: 6px; letter-spacing: 0.02em;
  }
  .mommy-btn:hover, .mommy-btn:focus-visible { border-color: var(--gold); outline: none; }
  .status-line { margin-top: 28px; font-size: 0.8rem; color: rgba(245, 239, 224, 0.5); min-height: 1.2em; }

  .overlay { position: fixed; inset: 0; background: rgba(20, 16, 34, 0.75); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-soft); border: 1px solid rgba(217, 165, 72, 0.3); border-radius: 16px; padding: 28px; width: 100%; max-width: 320px; text-align: center; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 1.2rem; margin: 0 0 16px; }
  .modal input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(245, 239, 224, 0.25); background: var(--bg); color: var(--cream); font-size: 1.1rem; text-align: center; letter-spacing: 0.3em; margin-bottom: 12px; }
  .modal input:focus { outline: none; border-color: var(--gold); }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal-actions button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; }
  .btn-confirm { background: var(--gold); color: var(--bg); }
  .btn-cancel { background: transparent; color: var(--cream); border: 1px solid rgba(245,239,224,0.2) !important; }
  .pin-error { color: var(--error); font-size: 0.85rem; min-height: 1.2em; margin-bottom: 8px; }

  /* ===== DASHBOARD ===== */
  .dashboard { display: none; }
  .dashboard.open { display: block; }
  .welcome-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .welcome-bar h1 { font-size: 1.5rem; margin: 0; }
  .logout-link { color: var(--gold-soft); font-size: 0.85rem; cursor: pointer; background: none; border: none; }

  /* progress bar */
  .progress-wrap { margin-bottom: 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--gold-soft); margin-bottom: 6px; }
  .progress-track { background: var(--bg-soft); border-radius: 999px; height: 14px; overflow: hidden; border: 1px solid rgba(217,165,72,0.2); }
  .progress-fill { background: linear-gradient(90deg, var(--rose), var(--gold)); height: 100%; border-radius: 999px; transition: width 0.4s ease; }

  .section-label { font-family: 'Fraunces', serif; font-size: 1.05rem; color: var(--gold-soft); margin: 26px 0 12px; }

  /* kid blocks (mommy view) */
  .kid-blocks { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  .kid-block { background: var(--bg-card); border: 1px solid rgba(217,165,72,0.18); border-radius: 16px; padding: 18px; }
  .kid-block-name { font-family: 'Fraunces', serif; font-size: 1.15rem; margin: 0 0 2px; }
  .kid-block-points { color: var(--gold-soft); font-size: 0.85rem; margin-bottom: 12px; }
  .kid-block-chores { font-size: 0.78rem; color: rgba(245,239,224,0.55); margin-bottom: 12px; line-height: 1.5; }
  .btn-small { width: 100%; background: transparent; border: 1px solid var(--gold); color: var(--gold-soft); padding: 9px; border-radius: 9px; font-size: 0.85rem; cursor: pointer; }
  .btn-small:hover { background: rgba(217,165,72,0.1); }

  /* unassigned chores block */
  .unassigned-panel { background: var(--bg-card); border: 1px dashed rgba(217,165,72,0.3); border-radius: 16px; padding: 18px; }
  .unassigned-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .btn-primary { background: var(--gold); color: var(--bg); border: none; padding: 10px 16px; border-radius: 9px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .chore-card { background: var(--bg-soft); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .chore-card:last-child { margin-bottom: 0; }
  .chore-name { font-weight: 600; font-size: 0.95rem; }
  .chore-desc { font-size: 0.78rem; color: rgba(245,239,224,0.6); margin-top: 2px; }
  .chore-points { color: var(--gold); font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
  .empty-note { font-size: 0.85rem; color: rgba(245,239,224,0.45); text-align: center; padding: 10px 0; }

  /* kid's own chore list */
  .my-chore-card { background: var(--bg-card); border-radius: 14px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .btn-complete { background: var(--green); color: var(--bg); border: none; padding: 9px 14px; border-radius: 9px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }

  /* toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gold); color: var(--bg); padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="page">

  <!-- LOGIN VIEW -->
  <div id="loginView" class="login-wrap">
    <div class="card">
      <div class="flames"><div class="flame"></div><div class="flame"></div></div>
      <h1>Shabbos Chores</h1>
      <p class="subtitle">Who's checking in?</p>
      <div id="kidGrid" class="kid-grid-login"></div>
      <button class="mommy-btn" id="mommyBtn">I'm Mommy</button>
      <div class="status-line" id="statusLine">Loading...</div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="dashboard">
    <div class="welcome-bar">
      <h1 id="welcomeText"></h1>
      <button class="logout-link" id="logoutBtn">Log out</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span>Season progress</span><span id="progressNumber">0 / 500 pts</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- MOMMY VIEW -->
    <div id="mommyView">
      <div class="section-label">The Kids</div>
      <div class="kid-blocks" id="kidBlocks"></div>

      <div class="section-label">Unassigned Chores</div>
      <div class="unassigned-panel">
        <div class="unassigned-header">
          <span style="font-size:0.85rem; color:rgba(245,239,224,0.6);" id="unassignedCount"></span>
          <button class="btn-primary" id="addChoreBtn">+ Add New Chore</button>
        </div>
        <div id="unassignedList"></div>
      </div>
    </div>

    <!-- KID VIEW -->
    <div id="kidView" style="display:none;">
      <div class="section-label">Your Chores</div>
      <div id="myChoreList"></div>
    </div>
  </div>

</div>

<!-- PIN MODAL -->
<div class="overlay" id="pinOverlay">
  <div class="modal">
    <h2>Enter Mommy's PIN</h2>
    <div class="pin-error" id="pinError"></div>
    <input type="password" inputmode="numeric" id="pinInput" maxlength="8" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="pinCancel">Cancel</button>
      <button class="btn-confirm" id="pinConfirm">Enter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== CONFIG =====
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx2h9qFRVB4yBifHUy5-RHGkHd2nxDrOg5G98_rAS1MWKblV-qe1SLD14MaKuUMZoax/exec";
  const SEASON_GOAL = 500;

  let appData = { kids: [], config: {}, chores: [] };
  let currentUser = null;

  const kidGrid = document.getElementById('kidGrid');
  const statusLine = document.getElementById('statusLine');
  const mommyBtn = document.getElementById('mommyBtn');
  const pinOverlay = document.getElementById('pinOverlay');
  const pinInput = document.getElementById('pinInput');
  const pinError = document.getElementById('pinError');
  const pinConfirm = document.getElementById('pinConfirm');
  const pinCancel = document.getElementById('pinCancel');
  const loginView = document.getElementById('loginView');
  const dashboardView = document.getElementById('dashboardView');
  const welcomeText = document.getElementById('welcomeText');
  const logoutBtn = document.getElementById('logoutBtn');
  const mommyView = document.getElementById('mommyView');
  const kidView = document.getElementById('kidView');
  const toast = document.getElementById('toast');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  async function loadData() {
    try {
      const res = await fetch(BACKEND_URL);
      const data = await res.json();
      appData.kids = data.kids || [];
      appData.config = (data.config && data.config[0]) || {};
      appData.chores = data.chores || [];
      renderKids();
      checkExistingSession();
    } catch (err) {
      statusLine.textContent = "Couldn't reach the chore list. Check your connection.";
      console.error(err);
    }
  }

  function renderKids() {
    kidGrid.innerHTML = '';
    if (appData.kids.length === 0) {
      statusLine.textContent = "No kids added yet — Mommy can add them from her dashboard.";
      return;
    }
    statusLine.textContent = '';
    appData.kids.forEach(kid => {
      const btn = document.createElement('button');
      btn.className = 'kid-btn';
      btn.textContent = kid.name;
      btn.onclick = () => logIn(kid.kid_id, kid.name, false);
      kidGrid.appendChild(btn);
    });
  }

  function logIn(id, name, isAdmin) {
    currentUser = { id, name, isAdmin };
    sessionStorage.setItem('shabbos_user', JSON.stringify(currentUser));
    showDashboard();
  }

  function checkExistingSession() {
    const saved = sessionStorage.getItem('shabbos_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      showDashboard();
    }
  }

  function showDashboard() {
    loginView.style.display = 'none';
    dashboardView.classList.add('open');
    welcomeText.textContent = currentUser.isAdmin ? 'Hi Mommy' : `Hi ${currentUser.name}`;

    renderProgressBar();

    if (currentUser.isAdmin) {
      mommyView.style.display = 'block';
      kidView.style.display = 'none';
      renderKidBlocks();
      renderUnassignedChores();
    } else {
      mommyView.style.display = 'none';
      kidView.style.display = 'block';
      renderMyChores();
    }
  }

  function renderProgressBar() {
    const total = appData.kids.reduce((sum, k) => sum + (Number(k.current_points) || 0), 0);
    const pct = Math.min((total / SEASON_GOAL) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressNumber').textContent = `${total} / ${SEASON_GOAL} pts`;
  }

  function renderKidBlocks() {
    const wrap = document.getElementById('kidBlocks');
    wrap.innerHTML = '';
    appData.kids.forEach(kid => {
      const assignedChores = appData.chores.filter(c => c.assigned_kid_id === kid.kid_id && c.status === 'assigned');
      const block = document.createElement('div');
      block.className = 'kid-block';
      block.innerHTML = `
        <div class="kid-block-name">${kid.name}</div>
        <div class="kid-block-points">${kid.current_points || 0} pts this season</div>
        <div class="kid-block-chores">${assignedChores.length ? assignedChores.length + ' chore(s) assigned' : 'No chores assigned yet'}</div>
        <button class="btn-small">Assign Chore</button>
      `;
      block.querySelector('.btn-small').onclick = () => showToast('Assign flow coming in the next piece!');
      wrap.appendChild(block);
    });
  }

  function renderUnassignedChores() {
    const list = document.getElementById('unassignedList');
    const unassigned = appData.chores.filter(c => c.status === 'unassigned');
    document.getElementById('unassignedCount').textContent = `${unassigned.length} waiting`;
    list.innerHTML = '';
    if (unassigned.length === 0) {
      list.innerHTML = '<div class="empty-note">Nothing waiting — add a chore to get started.</div>';
      return;
    }
    unassigned.forEach(chore => {
      const card = document.createElement('div');
      card.className = 'chore-card';
      card.innerHTML = `
        <div>
          <div class="chore-name">${chore.name}</div>
          <div class="chore-desc">${chore.description || ''}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="chore-points">${chore.points} pts</div>
          <button class="btn-small" style="width:auto;">Assign</button>
        </div>
      `;
      card.querySelector('.btn-small').onclick = () => showToast('Assign flow coming in the next piece!');
      list.appendChild(card);
    });
  }

  function renderMyChores() {
    const list = document.getElementById('myChoreList');
    const mine = appData.chores.filter(c => c.assigned_kid_id === currentUser.id && c.status === 'assigned');
    list.innerHTML = '';
    if (mine.length === 0) {
      list.innerHTML = '<div class="empty-note">No chores assigned to you right now.</div>';
      return;
    }
    mine.forEach(chore => {
      const card = document.createElement('div');
      card.className = 'my-chore-card';
      card.innerHTML = `
        <div>
          <div class="chore-name">${chore.name}</div>
          <div class="chore-desc">${chore.description || ''} · <span class="chore-points">${chore.points} pts</span></div>
        </div>
        <button class="btn-complete">Complete</button>
      `;
      card.querySelector('.btn-complete').onclick = () => showToast('Marking chores complete comes in the next piece!');
      list.appendChild(card);
    });
  }

  document.getElementById('addChoreBtn').onclick = () => showToast('Add Chore flow coming in the next piece!');

  logoutBtn.onclick = () => {
    sessionStorage.removeItem('shabbos_user');
    currentUser = null;
    dashboardView.classList.remove('open');
    loginView.style.display = 'flex';
  };

  mommyBtn.onclick = () => {
    pinInput.value = '';
    pinError.textContent = '';
    pinOverlay.classList.add('open');
    pinInput.focus();
  };
  pinCancel.onclick = () => pinOverlay.classList.remove('open');

  function tryPin() {
    const entered = pinInput.value.trim();
    const correct = String(appData.config.admin_pin || '');
    if (entered.length === 0) return;
    if (entered === correct) {
      pinOverlay.classList.remove('open');
      logIn('mommy', 'Mommy', true);
    } else {
      pinError.textContent = 'Incorrect PIN, try again.';
      pinInput.value = '';
      pinInput.focus();
    }
  }
  pinConfirm.onclick = tryPin;
  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPin(); });

  loadData();
</script>
</body>
</html>
