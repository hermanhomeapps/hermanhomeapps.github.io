<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shabbos Chores & Points</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #241F38;
    --bg-soft: #2E2850;
    --bg-card: #352E5C;
    --gold: #D9A548;
    --gold-soft: #F0D9A0;
    --cream: #F5EFE0;
    --rose: #C97064;
    --error: #E37B6B;
    --green: #7FA37A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, var(--bg-soft), var(--bg) 60%);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    padding: 24px;
  }
  .page { max-width: 720px; margin: 0 auto; }

  .hub-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--gold-soft); text-decoration: none; font-size: 0.8rem;
    opacity: 0.7; margin-bottom: 18px;
  }
  .hub-link:hover { opacity: 1; }

  /* ===== LOGIN VIEW ===== */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; flex-direction: column; }
  .card { width: 100%; max-width: 480px; text-align: center; }
  .flames { display: flex; justify-content: center; gap: 18px; margin-bottom: 8px; }
  .flame {
    width: 10px; height: 22px;
    background: linear-gradient(180deg, var(--gold-soft), var(--gold) 60%, var(--rose));
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    filter: blur(0.3px);
    animation: flicker 2.6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .flame:nth-child(2) { animation-delay: 0.4s; }
  @keyframes flicker {
    0%, 100% { transform: scaleY(1) rotate(-1deg); opacity: 1; }
    50% { transform: scaleY(1.08) rotate(1deg); opacity: 0.9; }
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 2rem; margin: 0 0 4px; }
  .subtitle { color: var(--gold-soft); font-size: 0.95rem; margin: 0 0 36px; opacity: 0.85; }
  .kid-grid-login { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .kid-btn {
    background: var(--bg-soft); border: 1px solid rgba(217, 165, 72, 0.25); color: var(--cream);
    font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 500; padding: 22px 12px;
    border-radius: 14px; cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .kid-btn:hover, .kid-btn:focus-visible { border-color: var(--gold); transform: translateY(-2px); outline: none; }
  .mommy-btn {
    width: 100%; background: transparent; border: 1px solid rgba(245, 239, 224, 0.2); color: var(--gold-soft);
    font-family: 'Inter', sans-serif; font-size: 0.9rem; padding: 14px; border-radius: 12px; cursor: pointer;
    margin-top: 6px; letter-spacing: 0.02em;
  }
  .mommy-btn:hover, .mommy-btn:focus-visible { border-color: var(--gold); outline: none; }
  .status-line { margin-top: 28px; font-size: 0.8rem; color: rgba(245, 239, 224, 0.5); min-height: 1.2em; }

  .overlay { position: fixed; inset: 0; background: rgba(20, 16, 34, 0.75); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg-soft); border: 1px solid rgba(217, 165, 72, 0.3); border-radius: 16px; padding: 28px; width: 100%; max-width: 320px; text-align: center; position: relative; }
  .modal-wide { max-width: 420px; text-align: left; }
  .modal h2 { font-family: 'Fraunces', serif; font-size: 1.2rem; margin: 0 0 16px; text-align: center; }
  .modal-wide h2 { text-align: left; }
  .modal input, .modal textarea {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(245, 239, 224, 0.25);
    background: var(--bg); color: var(--cream); font-size: 1rem; margin-bottom: 12px; font-family: 'Inter', sans-serif;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--gold); }
  #pinInput { text-align: center; letter-spacing: 0.3em; font-size: 1.1rem; }
  .field-label { font-size: 0.78rem; color: var(--gold-soft); margin-bottom: 6px; display: block; }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal-actions button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; }
  .btn-confirm { background: var(--gold); color: var(--bg); }
  .btn-cancel { background: transparent; color: var(--cream); border: 1px solid rgba(245,239,224,0.2) !important; }
  .pin-error { color: var(--error); font-size: 0.85rem; min-height: 1.2em; margin-bottom: 8px; text-align: center; }
  .close-x { position: absolute; top: 16px; right: 18px; background: none; border: none; color: var(--gold-soft); font-size: 1.2rem; cursor: pointer; }

  .field-wrap { position: relative; margin-bottom: 12px; }
  .field-wrap input, .field-wrap textarea { margin-bottom: 0; }
  .typeahead-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg); border: 1px solid rgba(217,165,72,0.3); border-radius: 10px;
    max-height: 180px; overflow-y: auto; z-index: 70; display: none;
  }
  .typeahead-list.open { display: block; }
  .typeahead-item { padding: 10px 12px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .typeahead-item:last-child { border-bottom: none; }
  .typeahead-item:hover { background: var(--bg-soft); }
  .typeahead-item small { display: block; color: rgba(245,239,224,0.5); font-size: 0.72rem; margin-top: 2px; }

  .pick-list { max-height: 320px; overflow-y: auto; }
  .pick-item {
    background: var(--bg-card); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .pick-item:hover { background: var(--bg); border: 1px solid var(--gold); }
  .pick-item-name { font-weight: 600; font-size: 0.9rem; }
  .pick-item-sub { font-size: 0.75rem; color: rgba(245,239,224,0.55); }

  /* ===== DASHBOARD ===== */
  .dashboard { display: none; }
  .dashboard.open { display: block; }
  .welcome-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .welcome-bar h1 { font-size: 1.5rem; margin: 0; }
  .logout-link { color: var(--gold-soft); font-size: 0.85rem; cursor: pointer; background: none; border: none; }

  .progress-wrap { margin-bottom: 28px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--gold-soft); margin-bottom: 6px; }
  .progress-track { background: var(--bg-soft); border-radius: 999px; height: 14px; overflow: hidden; border: 1px solid rgba(217,165,72,0.2); }
  .progress-fill { background: linear-gradient(90deg, var(--rose), var(--gold)); height: 100%; border-radius: 999px; transition: width 0.4s ease; }

  .section-label { font-family: 'Fraunces', serif; font-size: 1.05rem; color: var(--gold-soft); margin: 26px 0 12px; }

  .kid-blocks { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .kid-block { background: var(--bg-card); border: 1px solid rgba(217,165,72,0.18); border-radius: 16px; padding: 18px; }
  .kid-block-name { font-family: 'Fraunces', serif; font-size: 1.15rem; margin: 0 0 2px; }
  .kid-block-points { color: var(--gold-soft); font-size: 0.85rem; margin-bottom: 14px; }
  .btn-small { width: 100%; background: transparent; border: 1px solid var(--gold); color: var(--gold-soft); padding: 9px; border-radius: 9px; font-size: 0.85rem; cursor: pointer; margin-top: 4px; }
  .btn-small:hover { background: rgba(217,165,72,0.1); }

  .mini-chore-row {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    background: var(--bg-soft); border-radius: 9px; padding: 9px 10px; margin-bottom: 6px; font-size: 0.8rem;
  }
  .mini-chore-row.done { opacity: 0.6; }
  .mini-chore-name { font-weight: 600; }
  .mini-chore-pts { color: var(--gold); font-size: 0.72rem; margin-left: 5px; font-weight: 500; }
  .mini-btn {
    background: none; border: 1px solid var(--green); color: var(--green);
    font-size: 0.68rem; padding: 5px 9px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-weight: 600;
  }
  .mini-btn.undo-btn { border-color: var(--error); color: var(--error); }
  .empty-note-mini { font-size: 0.75rem; color: rgba(245,239,224,0.4); padding: 4px 0 10px; }

  .unassigned-panel { background: var(--bg-card); border: 1px dashed rgba(217,165,72,0.3); border-radius: 16px; padding: 18px; }
  .unassigned-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .btn-primary { background: var(--gold); color: var(--bg); border: none; padding: 10px 16px; border-radius: 9px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .chore-card { background: var(--bg-soft); border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .chore-card:last-child { margin-bottom: 0; }
  .chore-name { font-weight: 600; font-size: 0.95rem; }
  .chore-desc { font-size: 0.78rem; color: rgba(245,239,224,0.6); margin-top: 2px; }
  .chore-points { color: var(--gold); font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
  .empty-note { font-size: 0.85rem; color: rgba(245,239,224,0.45); text-align: center; padding: 10px 0; }

  .my-chore-card { background: var(--bg-card); border-radius: 14px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .my-chore-card.done { opacity: 0.55; }
  .btn-complete { background: var(--green); color: var(--bg); border: none; padding: 9px 14px; border-radius: 9px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .done-tag { color: var(--green); font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
  .completed-section-label { font-size: 0.72rem; color: rgba(245,239,224,0.4); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.06em; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--gold); color: var(--bg); padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 100; max-width: 85vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="page">

  <!-- LOGIN VIEW -->
  <div id="loginView" class="login-wrap">
    <a class="hub-link" href="https://hermanhomeapps.github.io/">&larr; HermanHomeApps</a>
    <div class="card">
      <div class="flames"><div class="flame"></div><div class="flame"></div></div>
      <h1>Shabbos Chores</h1>
      <p class="subtitle">Who's checking in?</p>
      <div id="kidGrid" class="kid-grid-login"></div>
      <button class="mommy-btn" id="mommyBtn">I'm Mommy</button>
      <div class="status-line" id="statusLine">Loading...</div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="dashboard">
    <a class="hub-link" href="https://hermanhomeapps.github.io/">&larr; HermanHomeApps</a>
    <div class="welcome-bar">
      <h1 id="welcomeText"></h1>
      <button class="logout-link" id="logoutBtn">Log out</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span>Season progress</span><span id="progressNumber">0 / 500 pts</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <!-- MOMMY VIEW -->
    <div id="mommyView">
      <div class="section-label">The Kids</div>
      <div class="kid-blocks" id="kidBlocks"></div>

      <div class="section-label">Unassigned Chores</div>
      <div class="unassigned-panel">
        <div class="unassigned-header">
          <span style="font-size:0.85rem; color:rgba(245,239,224,0.6);" id="unassignedCount"></span>
          <button class="btn-primary" id="addChoreBtn">+ Add New Chore</button>
        </div>
        <div id="unassignedList"></div>
      </div>
    </div>

    <!-- KID VIEW -->
    <div id="kidView" style="display:none;">
      <div class="section-label">Your Chores</div>
      <div id="myChoreList"></div>
      <div id="myCompletedLabel" class="completed-section-label" style="display:none;">Completed</div>
      <div id="myCompletedList"></div>
    </div>
  </div>

</div>

<!-- PIN MODAL -->
<div class="overlay" id="pinOverlay">
  <div class="modal">
    <h2>Enter Mommy's PIN</h2>
    <div class="pin-error" id="pinError"></div>
    <input type="password" inputmode="numeric" id="pinInput" maxlength="8" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="pinCancel">Cancel</button>
      <button class="btn-confirm" id="pinConfirm">Enter</button>
    </div>
  </div>
</div>

<!-- ADD CHORE MODAL -->
<div class="overlay" id="addChoreOverlay">
  <div class="modal modal-wide">
    <button class="close-x" id="addChoreClose">&times;</button>
    <h2>Add New Chore</h2>
    <div class="field-wrap">
      <label class="field-label">Chore name</label>
      <input type="text" id="choreNameInput" autocomplete="off" placeholder="e.g. Set the table">
      <div class="typeahead-list" id="typeaheadList"></div>
    </div>
    <div class="field-wrap">
      <label class="field-label">Points</label>
      <input type="number" id="chorePointsInput" min="1" placeholder="10">
    </div>
    <div class="field-wrap">
      <label class="field-label">Description</label>
      <textarea id="choreDescInput" rows="2" placeholder="Optional details"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="addChoreCancel">Cancel</button>
      <button class="btn-confirm" id="addChoreComplete">Complete</button>
    </div>
  </div>
</div>

<!-- DUPLICATE CONFIRM MODAL -->
<div class="overlay" id="dupOverlay">
  <div class="modal">
    <h2>Looks familiar</h2>
    <p style="font-size:0.88rem; color:rgba(245,239,224,0.75); margin-top:-6px;" id="dupMessage"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="dupUseExisting">Use Existing</button>
      <button class="btn-confirm" id="dupAddNew">Add as New</button>
    </div>
  </div>
</div>

<!-- PICK LIST MODAL (assign to kid / assign chore) -->
<div class="overlay" id="pickOverlay">
  <div class="modal modal-wide">
    <button class="close-x" id="pickClose">&times;</button>
    <h2 id="pickTitle"></h2>
    <div class="pick-list" id="pickList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== CONFIG =====
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx2h9qFRVB4yBifHUy5-RHGkHd2nxDrOg5G98_rAS1MWKblV-qe1SLD14MaKuUMZoax/exec";
  const SEASON_GOAL = 500;
  const DUP_THRESHOLD = 0.78;

  let appData = { kids: [], config: {}, chores: [] };
  let currentUser = null;
  let selectedExistingChoreName = null;
  let pendingDupResolution = null;

  const kidGrid = document.getElementById('kidGrid');
  const statusLine = document.getElementById('statusLine');
  const mommyBtn = document.getElementById('mommyBtn');
  const pinOverlay = document.getElementById('pinOverlay');
  const pinInput = document.getElementById('pinInput');
  const pinError = document.getElementById('pinError');
  const pinConfirm = document.getElementById('pinConfirm');
  const pinCancel = document.getElementById('pinCancel');
  const loginView = document.getElementById('loginView');
  const dashboardView = document.getElementById('dashboardView');
  const welcomeText = document.getElementById('welcomeText');
  const logoutBtn = document.getElementById('logoutBtn');
  const mommyView = document.getElementById('mommyView');
  const kidView = document.getElementById('kidView');
  const toast = document.getElementById('toast');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  async function loadData() {
    try {
      const res = await fetch(BACKEND_URL);
      const data = await res.json();
      appData.kids = data.kids || [];
      appData.config = (data.config && data.config[0]) || {};
      appData.chores = data.chores || [];
    } catch (err) {
      statusLine.textContent = "Couldn't reach the chore list. Check your connection.";
      console.error(err);
    }
  }

  async function postData(payload) {
    await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
  }

  async function refreshAndRerender() {
    await loadData();
    renderProgressBar();
    if (currentUser.isAdmin) {
      renderKidBlocks(); renderUnassignedChores();
    } else {
      renderMyChores();
    }
  }

  function renderKids() {
    kidGrid.innerHTML = '';
    if (appData.kids.length === 0) {
      statusLine.textContent = "No kids added yet — Mommy can add them from her dashboard.";
      return;
    }
    statusLine.textContent = '';
    appData.kids.forEach(kid => {
      const btn = document.createElement('button');
      btn.className = 'kid-btn';
      btn.textContent = kid.name;
      btn.onclick = () => logIn(kid.kid_id, kid.name, false);
      kidGrid.appendChild(btn);
    });
  }

  function logIn(id, name, isAdmin) {
    currentUser = { id, name, isAdmin };
    sessionStorage.setItem('shabbos_user', JSON.stringify(currentUser));
    showDashboard();
  }

  function checkExistingSession() {
    const saved = sessionStorage.getItem('shabbos_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      showDashboard();
    }
  }

  function showDashboard() {
    loginView.style.display = 'none';
    dashboardView.classList.add('open');
    welcomeText.textContent = currentUser.isAdmin ? 'Hi Mommy' : `Hi ${currentUser.name}`;
    renderProgressBar();
    if (currentUser.isAdmin) {
      mommyView.style.display = 'block';
      kidView.style.display = 'none';
      renderKidBlocks();
      renderUnassignedChores();
    } else {
      mommyView.style.display = 'none';
      kidView.style.display = 'block';
      renderMyChores();
    }
  }

  function renderProgressBar() {
    const total = appData.kids.reduce((sum, k) => sum + (Number(k.current_points) || 0), 0);
    const pct = Math.min((total / SEASON_GOAL) * 100, 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressNumber').textContent = `${total} / ${SEASON_GOAL} pts`;
  }

  // ===== MOMMY: kid blocks now list every assigned/completed chore by name =====
  function renderKidBlocks() {
    const wrap = document.getElementById('kidBlocks');
    wrap.innerHTML = '';
    appData.kids.forEach(kid => {
      const assigned = appData.chores.filter(c => c.assigned_kid_id === kid.kid_id && c.status === 'assigned');
      const completed = appData.chores.filter(c => c.assigned_kid_id === kid.kid_id && c.status === 'completed');

      const block = document.createElement('div');
      block.className = 'kid-block';

      let rowsHtml = '';
      if (assigned.length === 0 && completed.length === 0) {
        rowsHtml = '<div class="empty-note-mini">No chores assigned yet</div>';
      } else {
        assigned.forEach(c => {
          rowsHtml += `
            <div class="mini-chore-row">
              <span><span class="mini-chore-name">${c.name}</span><span class="mini-chore-pts">${c.points} pts</span></span>
              <button class="mini-btn" data-chore="${c.chore_id}" data-kid="${kid.kid_id}" data-action="complete">Mark Complete</button>
            </div>`;
        });
        completed.forEach(c => {
          rowsHtml += `
            <div class="mini-chore-row done">
              <span><span class="mini-chore-name">${c.name}</span><span class="mini-chore-pts">${c.points} pts</span></span>
              <button class="mini-btn undo-btn" data-chore="${c.chore_id}" data-kid="${kid.kid_id}" data-action="incomplete">Mark Incomplete</button>
            </div>`;
        });
      }

      block.innerHTML = `
        <div class="kid-block-name">${kid.name}</div>
        <div class="kid-block-points">${kid.current_points || 0} pts this season</div>
        ${rowsHtml}
        <button class="btn-small" data-action="assign">Assign Chore</button>
      `;
      block.querySelector('[data-action="assign"]').onclick = () => openPickChoreForKid(kid.kid_id, kid.name);
      block.querySelectorAll('[data-action="complete"]').forEach(btn => {
        btn.onclick = () => toggleChoreComplete(btn.dataset.chore, btn.dataset.kid, true);
      });
      block.querySelectorAll('[data-action="incomplete"]').forEach(btn => {
        btn.onclick = () => toggleChoreComplete(btn.dataset.chore, btn.dataset.kid, false);
      });
      wrap.appendChild(block);
    });
  }

  function renderUnassignedChores() {
    const list = document.getElementById('unassignedList');
    const unassigned = appData.chores.filter(c => c.status === 'unassigned');
    document.getElementById('unassignedCount').textContent = `${unassigned.length} waiting`;
    list.innerHTML = '';
    if (unassigned.length === 0) {
      list.innerHTML = '<div class="empty-note">Nothing waiting — add a chore to get started.</div>';
      return;
    }
    unassigned.forEach(chore => {
      const card = document.createElement('div');
      card.className = 'chore-card';
      card.innerHTML = `
        <div>
          <div class="chore-name">${chore.name}</div>
          <div class="chore-desc">${chore.description || ''}</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="chore-points">${chore.points} pts</div>
          <button class="btn-small" style="width:auto;">Assign</button>
        </div>
      `;
      card.querySelector('.btn-small').onclick = () => openPickKidForChore(chore.chore_id, chore.name);
      list.appendChild(card);
    });
  }

  // ===== KID: can only mark Complete, never Incomplete =====
  function renderMyChores() {
    const activeList = document.getElementById('myChoreList');
    const completedLabel = document.getElementById('myCompletedLabel');
    const completedList = document.getElementById('myCompletedList');

    const mine = appData.chores.filter(c => c.assigned_kid_id === currentUser.id && c.status === 'assigned');
    const mineDone = appData.chores.filter(c => c.assigned_kid_id === currentUser.id && c.status === 'completed');

    activeList.innerHTML = '';
    if (mine.length === 0) {
      activeList.innerHTML = '<div class="empty-note">No chores assigned to you right now.</div>';
    } else {
      mine.forEach(chore => {
        const card = document.createElement('div');
        card.className = 'my-chore-card';
        card.innerHTML = `
          <div>
            <div class="chore-name">${chore.name}</div>
            <div class="chore-desc">${chore.description || ''} · <span class="chore-points">${chore.points} pts</span></div>
          </div>
          <button class="btn-complete">Complete</button>
        `;
        card.querySelector('.btn-complete').onclick = () => toggleChoreComplete(chore.chore_id, currentUser.id, true);
        activeList.appendChild(card);
      });
    }

    completedList.innerHTML = '';
    if (mineDone.length > 0) {
      completedLabel.style.display = 'block';
      mineDone.forEach(chore => {
        const card = document.createElement('div');
        card.className = 'my-chore-card done';
        card.innerHTML = `
          <div>
            <div class="chore-name">${chore.name}</div>
            <div class="chore-desc">${chore.description || ''} · <span class="chore-points">${chore.points} pts</span></div>
          </div>
          <span class="done-tag">&#10003; Done</span>
        `;
        completedList.appendChild(card);
      });
    } else {
      completedLabel.style.display = 'none';
    }
  }

  // ===== COMPLETE / INCOMPLETE TOGGLE (shared by both roles) =====
  async function toggleChoreComplete(choreId, kidId, markComplete) {
    const chore = appData.chores.find(c => c.chore_id === choreId);
    const kid = appData.kids.find(k => k.kid_id === kidId);
    if (!chore || !kid) return;

    const pts = Number(chore.points) || 0;
    let updatedChore, updatedKid;

    if (markComplete) {
      updatedChore = Object.assign({}, chore, {
        status: 'completed',
        completed_at: new Date().toISOString(),
        completed_by: currentUser.id
      });
      updatedKid = Object.assign({}, kid, {
        current_points: (Number(kid.current_points) || 0) + pts
      });
      showToast('Marking complete...');
    } else {
      updatedChore = Object.assign({}, chore, {
        status: 'assigned',
        completed_at: '',
        completed_by: ''
      });
      updatedKid = Object.assign({}, kid, {
        current_points: Math.max(0, (Number(kid.current_points) || 0) - pts)
      });
      showToast('Marking incomplete...');
    }

    await postData({ sheet: 'chores', action: 'upsert', id_field: 'chore_id', rows: [updatedChore] });
    await postData({ sheet: 'kids', action: 'upsert', id_field: 'kid_id', rows: [updatedKid] });
    await refreshAndRerender();
    showToast(markComplete ? `+${pts} pts for ${kid.name}!` : `Points removed from ${kid.name}.`);
  }

  // ===== ASSIGN =====
  const pickOverlay = document.getElementById('pickOverlay');
  const pickTitle = document.getElementById('pickTitle');
  const pickList = document.getElementById('pickList');
  document.getElementById('pickClose').onclick = () => pickOverlay.classList.remove('open');

  function openPickKidForChore(choreId, choreName) {
    pickTitle.textContent = `Assign "${choreName}" to:`;
    pickList.innerHTML = '';
    if (appData.kids.length === 0) {
      pickList.innerHTML = '<div class="empty-note">No kids added yet.</div>';
    }
    appData.kids.forEach(kid => {
      const item = document.createElement('div');
      item.className = 'pick-item';
      item.innerHTML = `<span class="pick-item-name">${kid.name}</span><span class="pick-item-sub">${kid.current_points || 0} pts</span>`;
      item.onclick = () => assignChore(choreId, kid.kid_id);
      pickList.appendChild(item);
    });
    pickOverlay.classList.add('open');
  }

  function openPickChoreForKid(kidId, kidName) {
    pickTitle.textContent = `Assign a chore to ${kidName}:`;
    pickList.innerHTML = '';
    const unassigned = appData.chores.filter(c => c.status === 'unassigned');
    if (unassigned.length === 0) {
      pickList.innerHTML = '<div class="empty-note">No unassigned chores right now — add one first.</div>';
    }
    unassigned.forEach(chore => {
      const item = document.createElement('div');
      item.className = 'pick-item';
      item.innerHTML = `<span class="pick-item-name">${chore.name}</span><span class="pick-item-sub">${chore.points} pts</span>`;
      item.onclick = () => assignChore(chore.chore_id, kidId);
      pickList.appendChild(item);
    });
    pickOverlay.classList.add('open');
  }

  async function assignChore(choreId, kidId) {
    const chore = appData.chores.find(c => c.chore_id === choreId);
    if (!chore) return;
    const updated = Object.assign({}, chore, {
      status: 'assigned',
      assigned_kid_id: kidId,
      assigned_at: new Date().toISOString()
    });
    pickOverlay.classList.remove('open');
    showToast('Assigning...');
    await postData({ sheet: 'chores', action: 'upsert', id_field: 'chore_id', rows: [updated] });
    await refreshAndRerender();
    showToast('Chore assigned!');
  }

  // ===== ADD CHORE + TYPEAHEAD =====
  const addChoreOverlay = document.getElementById('addChoreOverlay');
  const choreNameInput = document.getElementById('choreNameInput');
  const chorePointsInput = document.getElementById('chorePointsInput');
  const choreDescInput = document.getElementById('choreDescInput');
  const typeaheadList = document.getElementById('typeaheadList');

  document.getElementById('addChoreBtn').onclick = openAddChoreModal;
  document.getElementById('addChoreCancel').onclick = closeAddChoreModal;
  document.getElementById('addChoreClose').onclick = closeAddChoreModal;

  function openAddChoreModal() {
    choreNameInput.value = '';
    chorePointsInput.value = '';
    choreDescInput.value = '';
    selectedExistingChoreName = null;
    typeaheadList.classList.remove('open');
    addChoreOverlay.classList.add('open');
    choreNameInput.focus();
  }
  function closeAddChoreModal() { addChoreOverlay.classList.remove('open'); }

  function getDistinctChores() {
    const map = {};
    appData.chores.forEach(c => {
      const key = (c.name || '').trim().toLowerCase();
      if (!key) return;
      if (!map[key] || (c.created_at || '') > (map[key].created_at || '')) {
        map[key] = c;
      }
    });
    return Object.values(map);
  }

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        dp[i][j] = a[i-1] === b[j-1]
          ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      }
    }
    return dp[m][n];
  }
  function similarity(a, b) {
    const maxLen = Math.max(a.length, b.length);
    if (maxLen === 0) return 1;
    return 1 - levenshtein(a, b) / maxLen;
  }

  choreNameInput.addEventListener('input', () => {
    selectedExistingChoreName = null;
    const val = choreNameInput.value.trim().toLowerCase();
    if (val.length < 2) { typeaheadList.classList.remove('open'); return; }
    const distinct = getDistinctChores();
    const scored = distinct.map(c => {
      const name = c.name.toLowerCase();
      const starts = name.startsWith(val) ? 1 : 0;
      const includes = name.includes(val) ? 1 : 0;
      const sim = similarity(name, val);
      return { chore: c, score: starts * 2 + includes + sim };
    }).filter(s => s.score > 0.55)
      .sort((a, b) => b.score - a.score)
      .slice(0, 5);

    typeaheadList.innerHTML = '';
    if (scored.length === 0) { typeaheadList.classList.remove('open'); return; }
    scored.forEach(s => {
      const item = document.createElement('div');
      item.className = 'typeahead-item';
      item.innerHTML = `${s.chore.name}<small>Last used: ${s.chore.points} pts${s.chore.description ? ' · ' + s.chore.description : ''}</small>`;
      item.onclick = () => {
        choreNameInput.value = s.chore.name;
        chorePointsInput.value = s.chore.points;
        choreDescInput.value = s.chore.description || '';
        selectedExistingChoreName = s.chore.name.toLowerCase();
        typeaheadList.classList.remove('open');
      };
      typeaheadList.appendChild(item);
    });
    typeaheadList.classList.add('open');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.field-wrap')) typeaheadList.classList.remove('open');
  });

  document.getElementById('addChoreComplete').onclick = () => {
    const name = choreNameInput.value.trim();
    const points = Number(chorePointsInput.value);
    const description = choreDescInput.value.trim();

    if (!name) { showToast('Give the chore a name first.'); return; }
    if (!points || points <= 0) { showToast('Points must be a positive number.'); return; }

    const typed = { name, points, description };

    if (selectedExistingChoreName === name.toLowerCase()) {
      finalizeSaveChore(typed);
      return;
    }

    const distinct = getDistinctChores();
    let best = null, bestScore = 0;
    distinct.forEach(c => {
      const s = similarity(c.name.toLowerCase(), name.toLowerCase());
      if (s > bestScore) { bestScore = s; best = c; }
    });

    if (best && bestScore >= DUP_THRESHOLD && best.name.toLowerCase() !== name.toLowerCase()) {
      pendingDupResolution = {
        typed,
        matched: { name: best.name, points: best.points, description: best.description || '' }
      };
      document.getElementById('dupMessage').textContent = `This looks similar to "${best.name}" — add it as a new chore anyway, or use the existing one?`;
      addChoreOverlay.classList.remove('open');
      document.getElementById('dupOverlay').classList.add('open');
    } else {
      finalizeSaveChore(typed);
    }
  };

  document.getElementById('dupUseExisting').onclick = () => {
    document.getElementById('dupOverlay').classList.remove('open');
    finalizeSaveChore(pendingDupResolution.matched);
    pendingDupResolution = null;
  };
  document.getElementById('dupAddNew').onclick = () => {
    document.getElementById('dupOverlay').classList.remove('open');
    finalizeSaveChore(pendingDupResolution.typed);
    pendingDupResolution = null;
  };

  async function finalizeSaveChore(data) {
    closeAddChoreModal();
    showToast('Saving chore...');
    const newChore = {
      chore_id: 'c_' + Date.now(),
      name: data.name,
      points: data.points,
      description: data.description || '',
      status: 'unassigned',
      assigned_kid_id: '',
      created_by: currentUser.id,
      created_at: new Date().toISOString(),
      assigned_at: '',
      completed_at: '',
      completed_by: ''
    };
    await postData({ sheet: 'chores', action: 'upsert', id_field: 'chore_id', rows: [newChore] });
    await refreshAndRerender();
    showToast('Chore added to Unassigned!');
  }

  // ===== LOGIN / SESSION =====
  logoutBtn.onclick = () => {
    sessionStorage.removeItem('shabbos_user');
    currentUser = null;
    dashboardView.classList.remove('open');
    loginView.style.display = 'flex';
  };

  mommyBtn.onclick = () => {
    pinInput.value = '';
    pinError.textContent = '';
    pinOverlay.classList.add('open');
    pinInput.focus();
  };
  pinCancel.onclick = () => pinOverlay.classList.remove('open');

  function tryPin() {
    const entered = pinInput.value.trim();
    const correct = String(appData.config.admin_pin || '');
    if (entered.length === 0) return;
    if (entered === correct) {
      pinOverlay.classList.remove('open');
      logIn('mommy', 'Mommy', true);
    } else {
      pinError.textContent = 'Incorrect PIN, try again.';
      pinInput.value = '';
      pinInput.focus();
    }
  }
  pinConfirm.onclick = tryPin;
  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPin(); });

  async function init() {
    await loadData();
    renderKids();
    checkExistingSession();
  }
  init();
</script>
</body>
