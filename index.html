<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HermanHomeApps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EAF0FB;
    --bg-deep: #DCE6FA;
    --ink: #262A3F;
    --ink-soft: #565C77;
    --sunflower: #FFC857;
    --coral: #FF6B5B;
    --mint: #2FB6A3;
    --sky: #5D9CEC;
    --grape: #9B72CF;
    --card-shadow: rgba(38, 40, 63, 0.18);
    --paper: #FFFFFF;
  }
 
  * { box-sizing: border-box; }
 
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 8%, var(--bg-deep) 0%, transparent 40%),
      radial-gradient(circle at 88% 92%, var(--bg-deep) 0%, transparent 45%),
      var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    padding: 48px 24px 80px;
  }
 
  .wrap {
    max-width: 980px;
    margin: 0 auto;
  }
 
  header {
    text-align: center;
    margin-bottom: 56px;
  }
 
  .wordmark {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1;
  }
 
  .wordmark span:nth-child(1) { color: var(--coral); }
  .wordmark span:nth-child(2) { color: var(--sunflower); }
  .wordmark span:nth-child(3) { color: var(--mint); }
  .wordmark span:nth-child(4) { color: var(--sky); }
  .wordmark span:nth-child(5) { color: var(--grape); }
 
  .tagline {
    font-size: 1.05rem;
    color: var(--ink-soft);
    margin-top: 14px;
    font-weight: 500;
  }
 
  .doodle {
    width: 120px;
    margin: 0 auto 8px;
    display: block;
  }
 
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 28px 24px;
    padding: 8px 0;
  }
 
  .card {
    --rot: 0deg;
    position: relative;
    background: var(--paper);
    border-radius: 18px;
    padding: 28px 20px 22px;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
    transform: rotate(var(--rot));
    box-shadow: 0 8px 18px var(--card-shadow);
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease;
    border-top: 6px solid var(--color, var(--sky));
  }
 
  .card:hover, .card:focus-visible {
    transform: rotate(0deg) translateY(-6px) scale(1.03);
    box-shadow: 0 16px 28px var(--card-shadow);
    outline: none;
  }
 
  .card:focus-visible {
    outline: 3px solid var(--ink);
    outline-offset: 3px;
  }
 
  .card-pin {
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--color, var(--sky));
    box-shadow: 0 2px 4px var(--card-shadow);
  }
 
  .card-icon {
    font-size: 2.4rem;
    line-height: 1;
  }
 
  .card-name {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
  }
 
  .status-pill {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 999px;
    background: var(--bg-deep);
    color: var(--ink-soft);
  }
 
  .status-pill.is-loading { opacity: 0.5; }
 
  .external-badge {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
 
  .card.add-new {
    background: transparent;
    border: 2px dashed #B9C4E0;
    box-shadow: none;
    justify-content: center;
    cursor: pointer;
  }
 
  .card.add-new:hover, .card.add-new:focus-visible {
    border-color: var(--ink-soft);
    box-shadow: none;
  }
 
  .card.add-new .card-icon { color: var(--ink-soft); }
 
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 20px 16px 12px;
    color: var(--ink-soft);
  }
 
  .empty-state .emoji {
    font-size: 2.2rem;
    display: block;
    margin-bottom: 10px;
    animation: sway 3.5s ease-in-out infinite;
  }
 
  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }
 
  .empty-state p {
    max-width: 380px;
    margin: 0 auto;
    font-size: 0.98rem;
    line-height: 1.5;
  }
 
  footer {
    text-align: center;
    margin-top: 64px;
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
 
  @media (prefers-reduced-motion: reduce) {
    .card, .empty-state .emoji { transition: none; animation: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <svg class="doodle" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 55 V30 L40 15 L60 30 V55" stroke="#FF6B5B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M65 55 V22 L85 8 L105 22 V55" stroke="#5D9CEC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="40" cy="42" r="3" fill="#FFC857"/>
        <circle cx="85" cy="38" r="3" fill="#2FB6A3"/>
      </svg>
      <h1 class="wordmark">
        <span>H</span><span>e</span><span>r</span><span>m</span><span>a</span>n<span> </span>Home<span> </span>Apps
      </h1>
      <p class="tagline">the family's corner of the internet</p>
    </header>
 
    <main class="grid" id="grid" aria-live="polite"></main>
 
    <footer>Built by the Herman family &middot; hosted on GitHub Pages</footer>
  </div>
 
<script>
  /*
    APP CONFIG
    ----------
    This array is only for apps you're adding by hand — typically INTEGRATED
    apps, since those need real backend work before they're ready to link.
 
    External apps no longer need to be added here manually: once someone
    finishes the New App wizard for an external app and clicks "Send to
    developer," it's automatically registered in the External Apps Registry
    Sheet and will show up on this hub on the next page load — nothing to
    paste in.
 
    Shape for an INTEGRATED app (lives at a sub-path of this same site,
    has a lightweight status endpoint from its Apps Script doGet):
      {
        name: "Laundry",
        type: "integrated",
        path: "/laundry/",
        icon: "🧺",
        statusUrl: "https://script.google.com/macros/s/XXXXXXXX/exec?action=status",
        color: "var(--mint)"
      }
 
    Shape for a manually-added EXTERNAL app (rarely needed now — the wizard
    handles this automatically, but this is here as a fallback):
      {
        name: "Health Tracker",
        type: "external",
        url: "https://example.com",
        icon: "❤️",
        color: "var(--coral)"
      }
  */

  const APPS = [
  {
    name: "Shabbos Chores & Points Lists",
    type: "integrated",
    path: "/shabbos-chores-points-lists-new/",
    icon: "🕯️",
    statusUrl: "https://script.google.com/macros/s/AKfycbx2h9qFRVB4yBifHUy5-RHGkHd2nxDrOg5G98_rAS1MWKblV-qe1SLD14MaKuUMZoax/exec?status=1",
    color: "var(--sunflower)"
  }
];
 
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJctPf1x6gGyipPT3jl1iuVmVgV6S-3CePmTykwV4birPAE8lMRLgrnw24ifwtxa23/exec";
 
  const PALETTE = ['var(--coral)', 'var(--sunflower)', 'var(--mint)', 'var(--sky)', 'var(--grape)'];
  const ROTATIONS = [-3, 2, -2, 3, -1.5, 1.5];
 
  async function fetchRegisteredExternalApps() {
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=listApps`);
      const data = await res.json();
      return (data.apps || []).map(a => ({ name: a.name, type: 'external', url: a.url, icon: a.icon || '🔗' }));
    } catch (err) {
      return [];
    }
  }
 
  async function fetchStatus(url) {
    try {
      const res = await fetch(url);
      const data = await res.json();
      return data.status || '—';
    } catch (err) {
      return '—';
    }
  }
 
  function makeCard(app, index) {
    const color = app.color || PALETTE[index % PALETTE.length];
    const rot = ROTATIONS[index % ROTATIONS.length];
    const href = app.type === 'integrated' ? app.path : app.url;
 
    const card = document.createElement('a');
    card.className = 'card';
    card.href = href;
    card.style.setProperty('--rot', rot + 'deg');
    card.style.setProperty('--color', color);
    if (app.type === 'external') {
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
    }
 
    const pin = document.createElement('span');
    pin.className = 'card-pin';
    card.appendChild(pin);
 
    const icon = document.createElement('span');
    icon.className = 'card-icon';
    icon.textContent = app.icon || '✨';
    card.appendChild(icon);
 
    const name = document.createElement('span');
    name.className = 'card-name';
    name.textContent = app.name;
    card.appendChild(name);
 
    if (app.type === 'integrated' && app.statusUrl) {
      const pill = document.createElement('span');
      pill.className = 'status-pill is-loading';
      pill.textContent = '···';
      card.appendChild(pill);
      fetchStatus(app.statusUrl).then(text => {
        pill.textContent = text;
        pill.classList.remove('is-loading');
      });
    } else if (app.type === 'external') {
      const badge = document.createElement('span');
      badge.className = 'external-badge';
      badge.textContent = 'opens elsewhere';
      card.appendChild(badge);
    }
 
    return card;
  }
 
  function makeAddNewCard() {
    const card = document.createElement('a');
    card.className = 'card add-new';
    card.href = 'new-app/index.html';
    card.innerHTML = '<span class="card-icon">＋</span><span class="card-name">New App</span>';
    return card;
  }
 
  async function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
 
    const dynamicExternalApps = await fetchRegisteredExternalApps();
    const allApps = [...APPS, ...dynamicExternalApps];
 
    if (allApps.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<span class="emoji" aria-hidden="true">🧺</span><p>This corner\'s still empty — the Laundry app is next up on the workbench. Once it\'s live, it\'ll show up right here.</p>';
      grid.appendChild(empty);
    } else {
      allApps.forEach((app, i) => grid.appendChild(makeCard(app, i)));
    }
 
    grid.appendChild(makeAddNewCard());
  }
 
  render();
</script>
</body>
</html>
